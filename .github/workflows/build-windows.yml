name: Build Windows Executable

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install .

      - name: Build exe
        run: pyinstaller orchestratia_agent.spec

      - name: Test exe runs
        run: |
          dist\orchestratia-agent.exe --version
          dist\orchestratia-agent.exe --help

      - name: Package hook scripts alongside exe
        run: |
          Copy-Item claude-skill\orchestratia-pretooluse.ps1 dist\
          Copy-Item claude-skill\orchestratia-context.ps1 dist\
          Copy-Item claude-skill\SKILL.md dist\
        shell: pwsh

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/orchestratia-agent.exe
            dist/orchestratia-pretooluse.ps1
            dist/orchestratia-context.ps1
            dist/SKILL.md
          fail_on_unmatched_files: true
